apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: prom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      nodeSelector:
        abc_node_type: master
      containers:
      - name: kube-state-metrics
        #image: k8simages8/kube-state-metrics-amd64:v1.3.1
        image: "k8simages8/kube-state-metrics-amd64:v1.3.1"
        ports:
        - containerPort: 8080
