apiVersion: v1
kind: ConfigMap
metadata:
  name: abc-experiment-service-config
  namespace: abc-platform
data:
  service.conf: |
    #本文件是配置文件，链接docker和kubernetes
    [Docker]
    docker_base_url=https://172.17.0.1:8088
    
    docker_cert = /etc/abc_platform/docker-ssl/client-cert.pem
    docker_key =  /etc/abc_platform/docker-ssl/client-key.pem
    docker_ca_cert = /etc/abc_platform/docker-ssl/ca.pem
    
    #k8s的配置文件，链接K8s APIService 服务
    [Kubernetes]
    #优先采用配置文件的方式，如果不采用配置文件，则采用后边的参数host,ssl_ca_cert,verify_ssl,token,assert_hostname 等
    # kube_config_file=96_admin.conf
    kube_config_file=/etc/kubernetes/admin.conf
    # kube_config_file=F:/DEV/odoo_original_14.0/odoo/debian/localhost_admin.conf
    # api-server地址
    kube_host= https://172.17.0.1:6443
    # 指定CA证书
    kube_ssl_ca_cert = /etc/kubernetes/pki/ca.crt
    # 启用证书验证,URL和IP都会被验证，一般不启用
    kube_verify_ssl = False
    kube_token = {{$token}}
    kube_assert_hostname = portal
    [Service]
    port=8075
    host=0.0.0.0
    virt_vnc_node=192.168.103.170
    virt_vnc_port=32211
    enable_auth=false
    auth_url_base=http://auth1.hi168.com:31069/vue/user/auth
  admin.conf: |
    apiVersion: v1
    clusters:
    - cluster:
        certificate-authority-data: {{$DATA}}
        server: https://192.168.103.151:6443
      name: cluster1
    contexts:
    - context:
        cluster: cluster1
        user: admin
      name: context-cluster1
    current-context: context-cluster1
    kind: Config
    preferences: {}
    users:
    - name: admin
      user:
        client-certificate-data: 
        client-key-data: 
  pre-start.sh: |
    echo "abc-experiment-service pre-start.sh called"
    mkdir -p /etc/kubernetes/
    mkdir -p /etc/abc_platform/docker-ssl
    cp /etc/abc-experiment-service/service.conf ${ABC_EXP_SERVICE}/service.conf
    cp /etc/abc-experiment-service/admin.conf /etc/kubernetes/admin.conf
    echo "abc-experiment-service pre-start.sh called finish"
